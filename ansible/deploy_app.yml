---
- name: Deploy Flask Application
  hosts: web
  become: true

  tasks:

    - name: Create application directory
      file:
        path: "{{ app_directory }}"
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Copy application files
      copy:
        src: ../app/
        dest: "{{ app_directory }}"
        owner: ubuntu
        group: ubuntu

    - name: Build Docker image
      command: docker build -t {{ app_name }} {{ app_directory }}

    - name: Stop existing container
      command: docker stop {{ container_name }}
      ignore_errors: yes

    - name: Remove existing container
      command: docker rm {{ container_name }}
      ignore_errors: yes

    - name: Run Docker container
      command: >
        docker run -d
        --name {{ container_name }}
        -p 5000:5000
        {{ app_name }}
